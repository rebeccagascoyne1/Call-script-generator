<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ping Identity — Call Script Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --surface-2: #f4f4f2;
    --border: rgba(0,0,0,0.10);
    --border-mid: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text-muted: #6b6b68;
    --text-hint: #9b9b97;
    --radius: 10px;
    --radius-lg: 14px;
    --ping-red: #d0021b;
    --ping-red-light: #fff0f1;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141413;
      --surface: #1e1e1c;
      --surface-2: #272725;
      --border: rgba(255,255,255,0.08);
      --border-mid: rgba(255,255,255,0.14);
      --text: #f0f0ee;
      --text-muted: #a0a09c;
      --text-hint: #666663;
      --ping-red-light: #2a0a0c;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
    font-size: 15px;
    line-height: 1.6;
  }

  header {
    border-bottom: 0.5px solid var(--border);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
  }

  .logo {
    width: 32px;
    height: 32px;
    background: var(--ping-red);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo svg { width: 18px; height: 18px; fill: white; }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .main {
    max-width: 760px;
    margin: 32px auto;
    padding: 0 20px;
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 20px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  input[type="text"], textarea {
    width: 100%;
    background: var(--surface-2);
    border: 0.5px solid var(--border-mid);
    border-radius: var(--radius);
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus, textarea:focus {
    border-color: var(--ping-red);
    background: var(--surface);
  }

  input::placeholder, textarea::placeholder {
    color: var(--text-hint);
  }

  textarea {
    resize: vertical;
    min-height: 72px;
    line-height: 1.55;
  }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .three-col {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  @media (max-width: 540px) {
    .two-col, .three-col { grid-template-columns: 1fr; }
  }

  .gen-btn {
    width: 100%;
    padding: 12px 20px;
    margin-top: 4px;
    background: var(--ping-red);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.01em;
  }

  .gen-btn:hover { opacity: 0.88; }
  .gen-btn:active { transform: scale(0.99); }
  .gen-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  .output-section { margin-top: 28px; }

  .branch {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 12px;
    overflow: hidden;
  }

  .branch-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface-2);
    cursor: pointer;
    user-select: none;
    border-bottom: 0.5px solid var(--border);
    transition: background 0.12s;
  }

  .branch-header:hover { background: var(--bg); }

  .branch-left { display: flex; align-items: center; gap: 10px; }

  .branch-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.03em;
  }

  .tag-opener { background: #e6f1fb; color: #185FA5; }
  .tag-yes    { background: #EAF3DE; color: #3B6D11; }
  .tag-maybe  { background: #FAEEDA; color: #854F0B; }
  .tag-no     { background: #FCEBEB; color: #A32D2D; }
  .tag-close  { background: #EEEDFE; color: #3C3489; }

  @media (prefers-color-scheme: dark) {
    .tag-opener { background: #0C447C; color: #B5D4F4; }
    .tag-yes    { background: #27500A; color: #C0DD97; }
    .tag-maybe  { background: #633806; color: #FAC775; }
    .tag-no     { background: #791F1F; color: #F7C1C1; }
    .tag-close  { background: #3C3489; color: #CECBF6; }
  }

  .branch-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .chevron {
    font-size: 11px;
    color: var(--text-muted);
    transition: transform 0.2s;
  }

  .chevron.open { transform: rotate(180deg); }

  .branch-body {
    padding: 16px 18px;
    background: var(--surface);
  }

  .script-text {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
    font-family: inherit;
  }

  .branch-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .copy-btn {
    font-size: 12px;
    padding: 5px 12px;
    background: transparent;
    color: var(--text-muted);
    border: 0.5px solid var(--border-mid);
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.12s;
  }

  .copy-btn:hover { background: var(--surface-2); color: var(--text); }

  .divider {
    border: none;
    border-top: 0.5px solid var(--border);
    margin: 0 0 24px;
  }

  .loading {
    text-align: center;
    padding: 32px 0;
    color: var(--text-muted);
    font-size: 14px;
  }

  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid var(--border-mid);
    border-top-color: var(--ping-red);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    font-size: 13px;
    color: #A32D2D;
    padding: 12px 16px;
    background: #FCEBEB;
    border-radius: var(--radius);
    margin-top: 16px;
  }

  @media (prefers-color-scheme: dark) {
    .error-msg { background: #2a0a0c; color: #F7C1C1; }
  }

  .api-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .api-row .field { flex: 1; margin-bottom: 0; }

  .api-note {
    font-size: 12px;
    color: var(--text-hint);
    margin-top: 6px;
    line-height: 1.5;
  }

  .api-note a { color: var(--ping-red); text-decoration: none; }
  .api-note a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
    </svg>
  </div>
  <div>
    <h1>Call Script Generator</h1>
    <p>Ping Identity — SDR outbound tool</p>
  </div>
</header>

<div class="main">

  <div class="card">
    <div class="card-title">API key</div>
    <div class="field">
      <label for="apikey">Anthropic API key</label>
      <input type="text" id="apikey" placeholder="sk-ant-..." autocomplete="off" />
      <p class="api-note">Your key is never stored or sent anywhere except the Anthropic API. Get one at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>.</p>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Prospect details</div>

    <div class="field">
      <label for="name">Prospect first name</label>
      <input type="text" id="pname" placeholder="e.g. James" />
    </div>

    <div class="field">
      <label for="industry">Industry</label>
      <input type="text" id="industry" placeholder="e.g. retail, fintech, healthcare" />
    </div>

    <div class="two-col">
      <div class="field">
        <label for="nd1">Name drop 1</label>
        <input type="text" id="nd1" placeholder="e.g. Tesco" />
      </div>
      <div class="field">
        <label for="nd2">Name drop 2</label>
        <input type="text" id="nd2" placeholder="e.g. Ocado" />
      </div>
    </div>

    <div class="field">
      <label for="play">What you do (sales play)</label>
      <textarea id="play" placeholder="e.g. help companies secure and personalise their customer login and identity experiences at scale"></textarea>
    </div>

    <div class="card-title" style="margin-top: 20px;">Business outcomes</div>
    <div class="three-col">
      <div class="field">
        <label for="o1">Outcome 1</label>
        <input type="text" id="o1" placeholder="e.g. reduced fraud" />
      </div>
      <div class="field">
        <label for="o2">Outcome 2</label>
        <input type="text" id="o2" placeholder="Optional" />
      </div>
      <div class="field">
        <label for="o3">Outcome 3</label>
        <input type="text" id="o3" placeholder="Optional" />
      </div>
    </div>

    <button class="gen-btn" id="genBtn" onclick="generateScript()">Generate script</button>
  </div>

  <div id="output"></div>

</div>

<script>
function getOutcomes() {
  const vals = ['o1','o2','o3'].map(id => document.getElementById(id).value.trim()).filter(Boolean);
  if (!vals.length) return '';
  if (vals.length === 1) return vals[0];
  const last = vals.pop();
  return vals.join(', ') + ' and ' + last;
}

function buildPrompt(name, industry, nd1, nd2, play, outcomes) {
  return `You are helping an SDR at Ping Identity write a personalised cold call script. Use EXACTLY the template structure below. Replace all placeholders. Output only the script — no preamble, no commentary.

Prospect name: ${name}
Industry: ${industry}
Name drop 1: ${nd1}
Name drop 2: ${nd2}
What we do: ${play}
Business outcomes: ${outcomes}

Output this exact structure:

---OPENER---
Hi ${name}, really glad I caught you. It's Rebecca here from Ping Identity. Have you heard the name before?

---IF YES (confident)---
Perfect — saves me the intro. The reason I'm calling you specifically is because we partner with companies in ${industry} — the likes of ${nd1} and ${nd2} — helping them to ${play}. We're seeing great results with ${outcomes}.

Is this something on your radar in 2026?

---IF HEARD A BIT / UNSURE---
That's great, so you know a bit about us already. The reason I'm calling is because Ping Identity helps companies ${play}. We've worked with a lot of companies in ${industry} — like ${nd1} and ${nd2} — doing exactly this and we've seen strong results with ${outcomes}.

Is this on your radar for 2026?

---IF NO---
Great — that's exactly why I'm calling, to make that intro. We're Ping Identity and we help companies ${play}. We've worked with companies in ${industry} like ${nd1} and ${nd2} doing exactly this and seen some great results with ${outcomes}.

Is this on your radar for 2026?

---CLOSE (after handling objections)---
Look, it sounds like this could be a worthwhile conversation. What I'd love to do is find 15 minutes in your calendar — when I'm not calling you out of the blue — to see if what we're doing for other companies in ${industry} would work for what you're focused on this year.`;
}

function parseSection(raw, marker) {
  const regex = new RegExp('---' + marker + '---([\\s\\S]*?)(?=---|$)');
  const m = raw.match(regex);
  return m ? m[1].trim() : '';
}

async function generateScript() {
  const apiKey = document.getElementById('apikey').value.trim();
  const name = document.getElementById('pname').value.trim();
  const industry = document.getElementById('industry').value.trim();
  const nd1 = document.getElementById('nd1').value.trim();
  const nd2 = document.getElementById('nd2').value.trim();
  const play = document.getElementById('play').value.trim();
  const outcomes = getOutcomes();

  if (!apiKey) {
    document.getElementById('output').innerHTML = '<div class="error-msg">Please enter your Anthropic API key above.</div>'; return;
  }
  if (!name || !industry || !nd1 || !play || !outcomes) {
    document.getElementById('output').innerHTML = '<div class="error-msg">Please fill in name, industry, at least one name drop, the sales play, and at least one outcome.</div>'; return;
  }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = 'Generating...';
  document.getElementById('output').innerHTML = '<div class="loading"><span class="spinner"></span>Building your script...</div>';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: buildPrompt(name, industry, nd1, nd2, play, outcomes) }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || 'API error ' + res.status);
    }

    const data = await res.json();
    const raw = data.content.map(b => b.text || '').join('');
    renderScript(raw, name, industry);
  } catch(e) {
    document.getElementById('output').innerHTML = `<div class="error-msg">${e.message}</div>`;
  }

  btn.disabled = false;
  btn.textContent = 'Generate script';
}

function renderScript(raw, name, industry) {
  const opener = parseSection(raw, 'OPENER');
  const yes    = parseSection(raw, 'IF YES \\(confident\\)');
  const maybe  = parseSection(raw, 'IF HEARD A BIT \\/ UNSURE');
  const no     = parseSection(raw, 'IF NO');
  const close  = parseSection(raw, 'CLOSE \\(after handling objections\\)');

  const branches = [
    { tag: 'Opener',              tagClass: 'tag-opener', name: 'Opening line',         text: opener },
    { tag: 'Yes',                 tagClass: 'tag-yes',    name: 'They say yes',          text: yes    },
    { tag: 'Heard a bit / unsure',tagClass: 'tag-maybe',  name: 'They\'ve heard of you', text: maybe  },
    { tag: 'No',                  tagClass: 'tag-no',     name: 'They say no',           text: no     },
    { tag: 'Close',               tagClass: 'tag-close',  name: 'The close',             text: close  },
  ];

  window._scripts = branches.map(b => b.text);

  const html = `
    <hr class="divider" />
    ${branches.map((b, i) => `
      <div class="branch" id="branch-${i}">
        <div class="branch-header" onclick="toggleBranch(${i})">
          <div class="branch-left">
            <span class="branch-tag ${b.tagClass}">${b.tag}</span>
            <span class="branch-name">${b.name}</span>
          </div>
          <span class="chevron open" id="chev-${i}">▼</span>
        </div>
        <div class="branch-body" id="body-${i}">
          <div class="script-text" id="text-${i}">${b.text}</div>
          <div class="branch-actions">
            <button class="copy-btn" onclick="copyText(${i}, this)">Copy</button>
          </div>
        </div>
      </div>
    `).join('')}
  `;

  document.getElementById('output').innerHTML = html;
}

function toggleBranch(i) {
  const body = document.getElementById('body-' + i);
  const chev = document.getElementById('chev-' + i);
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  chev.classList.toggle('open', !open);
}

function copyText(i, btn) {
  const text = window._scripts?.[i] || '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}
</script>
</body>
</html>
